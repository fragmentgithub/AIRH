<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#FFFBF2" />
<title>ひらがな ことばあそび</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88'>🐥</text></svg>" />
<!-- standalone web-app hints (home-screen launch without browser chrome) -->
<!-- "offline" here = browser HTTP cache + system maru-gothic font fallback only.
     A true offline PWA needs a service worker = a second file = breaks the
     single-file constraint, so NO service worker is added. -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="ひらがな" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="application-name" content="ひらがな" />
<!-- apple-touch-icon intentionally omitted: iOS requires a PNG (SVG/emoji
     data-URI not honored). To add one later, inline a base64 PNG:
     <link rel="apple-touch-icon" href="data:image/png;base64,XXXX" />.
     Until then iOS auto-snapshots the page for the home-screen icon. -->
<!-- Optional: inline manifest for Chromium install (display:standalone). Remove this line if undesired. -->
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%E3%81%B2%E3%82%89%E3%81%8C%E3%81%AA%20%E3%81%93%E3%81%A8%E3%81%B0%E3%81%82%E3%81%9D%E3%81%B3%22%2C%22short_name%22%3A%22%E3%81%B2%E3%82%89%E3%81%8C%E3%81%AA%22%2C%22lang%22%3A%22ja%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22orientation%22%3A%22portrait%22%2C%22background_color%22%3A%22%23FFFBF2%22%2C%22theme_color%22%3A%22%23FFFBF2%22%7D" />

<!-- Rounded Japanese display + UI faces (progressive enhancement; system maru-gothic fallback below) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet" />

<style>
/* ============================================================
   ひらがな ことばあそび  —  design tokens
   ============================================================ */
:root{
  /* warm picture-book crayon palette */
  --paper:#FFFBF2;        /* the page */
  --paper-2:#FFF3DF;      /* soft warm wash */
  --ink:#4A3B2E;          /* cocoa ink — text & big kana (gentler than black) */
  --ink-soft:#7A6A57;     /* muted ink for captions (AA on paper) */
  --card:#FFFFFF;         /* letter cards — readability first */
  --sun:#FFC24B;          /* sunny accent / slot frames */
  --coral:#FF7A59;        /* primary action warmth (fills only) */
  --coral-deep:#F2613F;   /* pressed coral */
  --coral-ink:#BF4626;    /* deep persimmon — coral used as TEXT (AA on paper) */
  --hana:#F0506E;         /* hanamaru stamp — the signature */
  --hana-deep:#D63B59;
  --sky:#7FC8E8;          /* gentle support */
  --leaf:#84C98B;         /* gentle support */
  --good:#5FB872;         /* soft positive */

  --font-display:"Zen Maru Gothic","Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN W4","Rounded Mplus 1c","M PLUS Rounded 1c",system-ui,sans-serif;
  --font-ui:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN","Rounded Mplus 1c",system-ui,sans-serif;
  --font-kana:"UD Digi Kyokasho NK-R","UD Digi Kyokasho N-R","UD デジタル 教科書体 NK-R","UD デジタル 教科書体 N-R","Yu Kyokasho","YuKyokasho","游教科書体","Hiragino Maru Gothic ProN","M PLUS Rounded 1c",system-ui,sans-serif;

  --r-card:22px;
  --r-pill:999px;
  --shadow-card:0 6px 0 rgba(74,59,46,.10), 0 10px 22px rgba(74,59,46,.12);
  --shadow-soft:0 8px 24px rgba(74,59,46,.10);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
.btn,.ghost-btn,.icon-btn,.listen-btn,.mode-opt,.home-mode,.tile,.slot,.toggle,.clap-btn,.ear-btn,.profile-btn,.friend,.custom-emoji,.mirror-choice{touch-action:manipulation;}
html,body{height:100%;}
body{
  margin:0;
  font-family:var(--font-ui);
  color:var(--ink);
  background:var(--paper);
  /* soft floating crayon shapes behind everything */
  background-image:
    radial-gradient(circle at 12% 18%, rgba(127,200,232,.16) 0 12%, transparent 12.5%),
    radial-gradient(circle at 88% 12%, rgba(255,194,75,.20) 0 9%, transparent 9.5%),
    radial-gradient(circle at 82% 86%, rgba(132,201,139,.16) 0 13%, transparent 13.5%),
    radial-gradient(circle at 16% 84%, rgba(240,80,110,.12) 0 10%, transparent 10.5%);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;        /* allow vertical scroll so the bottom is always reachable */
  user-select:none;
  -webkit-user-select:none;
}
body.calm{
  background-image:none;
}
body.calm *{
  animation-duration:.001ms !important;
  animation-iteration-count:1 !important;
  transition-duration:.06s !important;
}
body.modal-open{overflow:hidden;}
body.big-targets .choices{grid-template-columns:repeat(2,1fr);}
body.big-targets .tile{max-height:none;min-height:112px;font-size:clamp(48px,15vw,76px);}
body.lefty .choices{direction:rtl;}
body.lefty .tile{direction:ltr;}
body.lefty .pad-wrap{margin-left:max(0px,calc((100% - min(76vw,300px)) * .18));margin-right:auto;}

/* full-screen stage; safe-area aware for notched phones */
#app{
  position:relative;
  min-height:100dvh;   /* fill the screen, but grow + scroll if content is taller */
  width:100%;
  max-width:680px;
  margin:0 auto;
  padding:
    calc(env(safe-area-inset-top) + 8px)
    calc(env(safe-area-inset-right) + 16px)
    calc(env(safe-area-inset-bottom) + 12px)
    calc(env(safe-area-inset-left) + 16px);
  display:flex;
  flex-direction:column;
}

/* ---- screens ---- */
.screen{
  position:relative;   /* positioning context for parent link */
  flex:1 1 auto;       /* fill #app; grow past it when content overflows */
  min-height:0;
  display:none;
  flex-direction:column;
}
.screen.is-active{display:flex;animation:screen-in .32s ease both;}
@keyframes screen-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

/* ============================================================
   shared bits
   ============================================================ */
.btn{
  font-family:var(--font-ui);
  font-weight:800;
  border:none;
  cursor:pointer;
  color:var(--ink); /* dark cocoa on coral — AA, crayon-label look */
  background:var(--coral);
  border-radius:var(--r-pill);
  box-shadow:0 6px 0 var(--coral-deep), 0 12px 20px rgba(242,97,63,.28);
  transition:transform .08s ease, box-shadow .08s ease;
  line-height:1;
}
.btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--coral-deep), 0 6px 12px rgba(242,97,63,.24);}
.btn--big{font-size:clamp(24px,6vw,30px);padding:.62em 1.42em;}
.btn--next{font-size:clamp(24px,6.5vw,30px);padding:.62em 1.6em;}
.btn:focus-visible{outline:4px solid var(--ink);outline-offset:3px;}

.ghost-btn{
  font-family:var(--font-ui);
  font-weight:700;
  border:none;background:transparent;cursor:pointer;
  color:var(--ink-soft);
  display:inline-flex;align-items:center;justify-content:center;
  min-height:44px;padding:8px 16px;
}
.ghost-btn:focus-visible{outline:3px solid var(--ink);outline-offset:2px;border-radius:8px;}

/* ============================================================
   HOME
   ============================================================ */
.home{
  justify-content:center;align-items:center;text-align:center;
  gap:clamp(8px,1.8vh,14px);
  padding-top:44px;
  padding-bottom:54px;
}
.profile-row{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:8px;align-items:center;justify-content:center;}
.profile-btn{
  width:44px;height:44px;border:none;border-radius:50%;background:var(--card);
  box-shadow:var(--shadow-soft);font-size:24px;display:grid;place-items:center;cursor:pointer;
}
.profile-btn.is-on{outline:4px solid var(--sun);outline-offset:2px;}
.home__mascot{font-size:clamp(48px,14vw,80px);line-height:1;filter:drop-shadow(0 8px 10px rgba(74,59,46,.16));animation:bob 3.4s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-12px) rotate(2deg);}}
.home__title{
  font-family:var(--font-display);
  font-weight:900;
  margin:0;
  font-size:clamp(30px,8vw,44px);
  letter-spacing:.04em;
  line-height:1.1;
  color:var(--ink);
  text-shadow:0 3px 0 #fff, 0 4px 0 rgba(255,194,75,.55);
}
.home__title .t-accent{color:var(--coral-ink);}
.home__sub{margin:-2px 0 0;color:var(--ink-soft);font-weight:700;font-size:clamp(13px,3.4vw,16px);}

.home-modes{
  width:min(100%,360px);
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:8px;
  justify-content:center;
}
.home-mode{
  min-height:58px;
  border:none;
  border-radius:18px;
  background:var(--paper-2);
  color:var(--ink);
  box-shadow:0 4px 0 rgba(74,59,46,.10),0 8px 16px rgba(74,59,46,.08);
  font-family:var(--font-ui);
  font-weight:900;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  padding:6px 4px;
  cursor:pointer;
}
.home-mode__icon{font-size:clamp(21px,5.8vw,29px);line-height:1;}
.home-mode__label{font-size:clamp(11px,3.1vw,14px);line-height:1.15;white-space:nowrap;}
.home-mode.is-on{
  background:var(--card);
  box-shadow:0 5px 0 rgba(255,194,75,.75),var(--shadow-soft);
  outline:3px solid var(--sun);
  outline-offset:1px;
}
.home-mode:focus-visible{outline:4px solid var(--coral);outline-offset:2px;}

/* today's hanamaru tray */
.tray{
  display:flex;align-items:center;gap:10px;
  background:var(--card);
  border-radius:var(--r-pill);
  padding:8px 16px;
  box-shadow:var(--shadow-soft);
}
.tray__label{font-weight:800;color:var(--ink);font-size:clamp(13px,3.4vw,15px);white-space:nowrap;}
.tray__hanas{display:flex;flex-wrap:wrap;gap:4px;align-items:center;max-width:42vw;}
.tray__hanas svg{width:24px;height:24px;}
.tray__none{color:var(--ink-soft);font-weight:700;font-size:13px;}
.tray__more{font-weight:800;color:var(--hana-deep);font-size:15px;}

.home__parent{
  position:absolute;left:50%;bottom:4px;transform:translateX(-50%);
  font-size:13px;color:var(--ink-soft);background:rgba(255,255,255,.86);
  border-radius:var(--r-pill);box-shadow:var(--shadow-soft);padding:8px 14px;
} /* #app already pads the safe area */
.home__parent::before{content:"⚙ ";font-size:12px;}
.friend-hill{
  width:min(94%,390px);min-height:72px;position:relative;margin:0 auto;
  border-radius:24px 24px 36px 36px;
  background:linear-gradient(180deg,rgba(127,200,232,.14),rgba(127,200,232,0) 48%),linear-gradient(180deg,#DFF3D9,#BEE6AE);
  box-shadow:inset 0 -12px 0 rgba(95,184,114,.12),var(--shadow-soft);
  overflow:hidden;
}
.friend-hill::after{content:"";position:absolute;left:-8%;right:-8%;bottom:-28px;height:52px;border-radius:50%;background:#9BD48D;}
.friend{
  position:absolute;z-index:1;border:none;background:transparent;cursor:pointer;
  width:34px;height:34px;display:grid;place-items:center;
  font-size:clamp(18px,5.4vw,27px);line-height:1;filter:drop-shadow(0 3px 2px rgba(74,59,46,.16));
}
.friend.is-new{animation:friend-in .38s ease both;}
@keyframes friend-in{0%{transform:translateY(12px) scale(.5);opacity:0;}100%{transform:none;opacity:1;}}

/* ============================================================
   QUIZ
   ============================================================ */
.quiz{gap:clamp(8px,1.6vh,14px);}

.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:44px;}
.progress{display:flex;gap:7px;align-items:center;}
.pip{width:14px;height:14px;border-radius:50%;background:#EBDFC8;transition:transform .2s ease,background .2s ease;position:relative;display:grid;place-items:center;color:#fff;font-size:10px;font-weight:900;}
.pip.is-done{background:var(--good);}
.pip.is-done::after{content:"✓";line-height:1;}
.pip.is-now{background:var(--sun);transform:scale(1.35);}
.icon-btn{
  width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;
  background:var(--card);box-shadow:var(--shadow-soft);
  font-size:22px;display:grid;place-items:center;color:var(--ink);
  transition:transform .08s ease;
}
.icon-btn:active{transform:scale(.92);}
.icon-btn:focus-visible{outline:3px solid var(--ink);outline-offset:2px;}
.icon-btn.is-muted{opacity:.5;}

/* hint */
.hint{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:clamp(2px,1vh,8px);}
.hint__say{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-weight:700;color:var(--ink);font-size:clamp(17px,4.6vw,22px);}
.hint__say .peep{font-size:1.5em;}
.peep.is-peek{animation:peep-peek .32s ease both;}
.peep.is-think{animation:peep-think .45s ease both;}
.peep.is-happy{animation:peep-happy .45s ease both;}
@keyframes peep-peek{0%{transform:translateY(0);}50%{transform:translateY(-6px) scale(1.05);}100%{transform:none;}}
@keyframes peep-think{0%,100%{transform:rotate(0);}45%{transform:rotate(-9deg);}75%{transform:rotate(7deg);}}
@keyframes peep-happy{0%,100%{transform:none;}45%{transform:translateY(-8px) scale(1.08);}}
.hint__card{
  background:var(--card);
  border-radius:30px;
  box-shadow:var(--shadow-card);
  width:clamp(120px,34vw,168px);
  height:clamp(120px,34vw,168px);
  display:grid;place-items:center;
  font-size:clamp(64px,18vw,96px);
  line-height:1;
}
.mouth-cue{
  min-height:36px;display:grid;place-items:center;
  font-size:28px;opacity:0;transform:scale(.9);
  transition:opacity .16s ease,transform .16s ease;
}
.mouth-cue.is-on{opacity:1;transform:scale(1);}
.listen-btn{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--font-ui);font-weight:800;font-size:clamp(15px,4vw,18px);
  color:var(--ink);background:var(--paper-2);
  border:none;border-radius:var(--r-pill);padding:.5em 1.1em;cursor:pointer;
  box-shadow:0 3px 0 rgba(74,59,46,.10);
}
.listen-btn:active{transform:translateY(2px);}
.listen-btn:focus-visible{outline:3px solid var(--ink);outline-offset:2px;}

/* answer slots */
.slots{display:flex;justify-content:center;gap:clamp(10px,3vw,16px);margin:clamp(6px,1.6vh,14px) 0;}
.slot{
  width:clamp(58px,16vw,82px);
  height:clamp(70px,19vw,98px);
  border-radius:var(--r-card);
  background:var(--paper-2);
  border:4px dashed rgba(255,194,75,.85);
  display:grid;place-items:center;
  font-family:var(--font-kana);font-weight:900;
  font-size:clamp(34px,10vw,52px);
  color:var(--ink);
  cursor:pointer;
  transition:transform .12s ease, border-color .15s ease, background .15s ease;
}
.slot.is-filled{background:var(--card);border-style:solid;border-color:var(--sun);box-shadow:var(--shadow-card);}
.slot.is-pop{animation:slot-pop .26s ease;}
@keyframes slot-pop{0%{transform:scale(.5);}60%{transform:scale(1.12);}100%{transform:scale(1);}}
.slots.is-wrong{animation:wobble .5s ease;}
@keyframes wobble{0%,100%{transform:translateX(0);}20%{transform:translateX(-9px) rotate(-1.5deg);}40%{transform:translateX(9px) rotate(1.5deg);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}

/* gentle message line */
.message{min-height:1.6em;margin:0;text-align:center;font-family:var(--font-display);font-weight:700;font-size:clamp(18px,4.6vw,22px);color:var(--coral-ink);transition:opacity .2s;}

/* answer area wrapper (cards OR handwriting) is pushed to the bottom */
.answer-area{margin-top:auto;display:flex;flex-direction:column;}
.answer-area[hidden]{display:none;}

/* letter cards */
.choices{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(0,1fr));
  gap:clamp(10px,2.6vw,16px);
  padding-bottom:4px;
  justify-content:center; /* keep the tiles a centered group — don't spread to the edges on wide/tablet screens */
}
.choices.cols-2{grid-template-columns:repeat(2,minmax(0,112px));}
.choices.cols-3{grid-template-columns:repeat(3,minmax(0,112px));}
.tile{
  aspect-ratio:1/1;
  max-height:112px;
  border:none;cursor:pointer;
  background:var(--card);
  border-radius:var(--r-card);
  font-family:var(--font-kana);font-weight:900;
  font-size:clamp(40px,12vw,62px);
  color:var(--ink);
  box-shadow:var(--shadow-card);
  display:grid;place-items:center;
  transition:transform .09s ease, box-shadow .09s ease;
}
.tile:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(74,59,46,.10),0 5px 12px rgba(74,59,46,.12);}
.tile:focus-visible{outline:4px solid var(--coral);outline-offset:3px;}
.tile.is-hint{animation:hint-glow 1.1s ease-in-out infinite;}
.tile.is-hint:focus-visible{outline-color:var(--sun);}
.tile.is-dwell{box-shadow:var(--shadow-card),0 0 0 10px rgba(127,200,232,.45);}
/* glow stays put — no transform — so the tap target never moves under a small finger */
@keyframes hint-glow{0%,100%{box-shadow:var(--shadow-card),0 0 0 0 rgba(255,194,75,0);}50%{box-shadow:var(--shadow-card),0 0 0 8px rgba(255,194,75,.65);}}

.redo{align-self:center;margin-top:8px;font-size:clamp(14px,3.8vw,16px);}

.quiz[data-mode="cards"]{gap:clamp(4px,1.1vh,10px);}
.quiz[data-mode="cards"] .hint{gap:4px;margin-top:0;}
.quiz[data-mode="cards"] .hint__card{
  width:clamp(104px,29vw,138px);
  height:clamp(104px,29vw,138px);
  font-size:clamp(56px,15vw,80px);
  border-radius:24px;
}
.quiz[data-mode="cards"] .mouth-cue{min-height:24px;font-size:22px;}
.quiz[data-mode="cards"] .listen-btn{font-size:clamp(14px,3.6vw,16px);padding:.42em 1em;}
.quiz[data-mode="cards"] .slots{gap:clamp(8px,2vw,12px);margin:4px 0;}
.quiz[data-mode="cards"] .slot{
  width:clamp(52px,14vw,72px);
  height:clamp(60px,16vw,82px);
  font-size:clamp(30px,8vw,44px);
}
.quiz[data-mode="cards"] .message{min-height:1.35em;font-size:clamp(16px,4vw,20px);}
.quiz[data-mode="cards"] #cards-area{margin-top:0;}
.quiz[data-mode="cards"] .choices{gap:clamp(8px,2vw,12px);}
.quiz[data-mode="cards"] .choices.cols-2{grid-template-columns:repeat(2,minmax(0,104px));}
.quiz[data-mode="cards"] .choices.cols-3{grid-template-columns:repeat(3,minmax(0,96px));}
.quiz[data-mode="cards"] .tile{max-height:104px;font-size:clamp(36px,10vw,56px);}
.quiz[data-mode="cards"] .redo{margin-top:4px;}
.quiz[data-mode="cards"][data-length="3"] .hint__card{
  width:clamp(92px,26vw,124px);
  height:clamp(92px,26vw,124px);
  font-size:clamp(50px,13vw,72px);
}
.quiz[data-mode="cards"][data-length="3"] .slot{
  width:clamp(48px,13vw,64px);
  height:clamp(56px,15vw,74px);
  font-size:clamp(28px,7.4vw,38px);
}
.quiz[data-mode="cards"][data-length="3"] .choices.cols-3{grid-template-columns:repeat(3,minmax(0,92px));}
.quiz[data-mode="cards"][data-length="3"] .tile{max-height:92px;font-size:clamp(34px,9vw,50px);}

/* ---- handwriting (trace) mode ---- */
.pad-wrap{
  position:relative;
  width:min(76vw,300px);
  aspect-ratio:1/1;
  margin:0 auto;
  border-radius:var(--r-card);
  background:var(--card);
  box-shadow:var(--shadow-card);
  overflow:hidden;
}
.pad-wrap::after{ /* faint baseline cross to guide centring */
  content:"";position:absolute;inset:12%;border-radius:14px;
  border:2px dashed rgba(255,194,75,.5);pointer-events:none;
}
.pad-wrap canvas{position:absolute;inset:0;width:100%;height:100%;}
#pad{touch-action:none;cursor:crosshair;}
.pad-done{
  position:absolute;inset:0;display:grid;place-items:center;
  font-size:130px;color:var(--good);opacity:0;pointer-events:none;
  text-shadow:0 3px 0 #fff;
}
.pad-done.is-on{animation:pad-pop .55s ease;}
@keyframes pad-pop{0%{opacity:0;transform:scale(.4) rotate(-12deg);}45%{opacity:1;transform:scale(1.12) rotate(4deg);}100%{opacity:0;transform:scale(1);}}
.ghost-dot{
  position:absolute;width:22px;height:22px;border-radius:50%;background:var(--sun);
  border:3px solid #fff;box-shadow:0 3px 8px rgba(74,59,46,.22);
  left:0;top:0;opacity:0;pointer-events:none;z-index:3;
  transform:translate(139px,54px) scale(.8);
}
.ghost-dot.is-on{opacity:1;}
@keyframes ghost-trace{
  0%{opacity:0;transform:translate(-50%,0) scale(.7);}
  15%{opacity:1;}
  50%{transform:translate(-110px,88px) scale(1);}
  88%{opacity:1;transform:translate(86px,172px) scale(1);}
  100%{opacity:0;transform:translate(86px,172px) scale(.7);}
}

.clap-area,.mirror-area,.ear-area{align-items:center;gap:14px;}
.mora-dots{display:flex;justify-content:center;gap:12px;min-height:46px;}
.mora-dot{width:34px;height:34px;border-radius:50%;background:#E8DCC6;box-shadow:inset 0 2px 0 rgba(74,59,46,.12);}
.mora-dot.is-on{background:var(--sun);box-shadow:var(--shadow-soft);}
.clap-btn,.ear-btn{
  border:none;cursor:pointer;background:var(--card);box-shadow:var(--shadow-card);
  border-radius:var(--r-card);color:var(--ink);font-family:var(--font-display);font-weight:900;
  min-height:150px;width:min(82vw,360px);font-size:clamp(58px,18vw,92px);
}
.clap-reset{align-self:center;}
.mirror-choices{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;width:100%;max-width:420px;margin:0 auto;}
.mirror-choice{
  border:none;cursor:pointer;background:var(--card);box-shadow:var(--shadow-card);border-radius:var(--r-card);
  min-height:150px;font-family:var(--font-display);font-weight:900;font-size:clamp(70px,22vw,110px);color:var(--ink);
}
.mirror-choices.is-wrong{animation:wobble .5s ease;}
.mirror-choice.is-flip span{display:inline-block;transform:scaleX(-1);}
.mirror-choice.is-rotate span{display:inline-block;transform:rotate(180deg);}

.trace-actions{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
.quiz[data-mode="trace"]{gap:clamp(4px,1vh,10px);}
.quiz[data-mode="trace"] .hint{gap:4px;margin-top:0;}
.quiz[data-mode="trace"] .hint__card{
  width:clamp(96px,27vw,132px);
  height:clamp(96px,27vw,132px);
  font-size:clamp(52px,14vw,76px);
  border-radius:24px;
}
.quiz[data-mode="trace"] .mouth-cue{min-height:24px;font-size:22px;}
.quiz[data-mode="trace"] .listen-btn{font-size:clamp(14px,3.6vw,16px);padding:.42em 1em;}
.quiz[data-mode="trace"] .slots{margin:4px 0;}
.quiz[data-mode="trace"] .slot{
  width:clamp(50px,13vw,68px);
  height:clamp(58px,15vw,76px);
  font-size:clamp(28px,8vw,42px);
}
.quiz[data-mode="trace"] .message{min-height:1.35em;font-size:clamp(16px,4vw,20px);}
.quiz[data-mode="trace"] #trace-area{margin-top:0;align-items:center;gap:6px;}
.quiz[data-mode="trace"] .pad-wrap{width:min(58vw,240px);}
.quiz[data-mode="trace"] .redo{margin-top:0;}

/* ---- play-mode selector (parent sheet) ---- */
.mode-seg{
  display:inline-flex;gap:4px;padding:5px;align-self:center;
  background:var(--paper-2);border-radius:var(--r-pill);
  box-shadow:inset 0 1px 3px rgba(74,59,46,.10);
}
.mode-opt{
  display:inline-flex;align-items:center;justify-content:center;min-height:44px;
  font-family:var(--font-ui);font-weight:800;font-size:clamp(14px,3.8vw,16px);
  border:none;cursor:pointer;color:var(--ink-soft);background:transparent;
  border-radius:var(--r-pill);padding:.5em 1em;transition:color .15s,background .15s,box-shadow .15s;
}
.mode-opt.is-on{color:var(--ink);background:var(--card);box-shadow:var(--shadow-soft);}
.mode-opt:focus-visible{outline:3px solid var(--coral);outline-offset:2px;}
.sheet .mode-seg{margin-left:auto;}
.sheet .mode-opt{font-size:14px;padding:0 .85em;}
.mode-seg--wrap{width:100%;margin-left:0;justify-content:center;flex-wrap:wrap;border-radius:20px;}
.mode-seg--wrap .mode-opt{flex:1 1 92px;white-space:nowrap;}
#limit-seg{width:100%;margin-left:0;justify-content:center;flex-wrap:wrap;border-radius:20px;}
#limit-seg .mode-opt{flex:1 1 64px;white-space:nowrap;}
.sheet__row--stack{flex-direction:column;align-items:flex-start;gap:8px;}
.custom-panel{width:100%;display:grid;gap:8px;}
.custom-panel input{
  width:100%;min-height:44px;border:2px solid var(--paper-2);border-radius:14px;
  padding:8px 10px;font-family:var(--font-ui);font-weight:800;font-size:18px;color:var(--ink);
}
.custom-emojis{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.custom-emoji{min-height:40px;border:none;border-radius:12px;background:var(--paper-2);font-size:22px;cursor:pointer;}
.custom-emoji.is-on{outline:3px solid var(--sun);background:var(--card);}
.custom-feedback{min-height:18px;color:var(--coral-ink);font-weight:800;font-size:13px;line-height:1.35;}
.custom-list{display:flex;flex-wrap:wrap;gap:6px;color:var(--ink-soft);font-weight:800;font-size:13px;}
.trail-chart{width:100%;height:42px;}
.trail-chart svg{width:100%;height:42px;display:block;}
.focus-text{font-weight:800;color:var(--ink-soft);font-size:13px;line-height:1.4;}

/* ============================================================
   SUCCESS  (overlay over quiz)
   ============================================================ */
.success{justify-content:center;align-items:center;text-align:center;gap:clamp(14px,3vh,26px);background:
   radial-gradient(120% 80% at 50% 0%, rgba(255,194,75,.22), transparent 60%), var(--paper);}
.success__emoji{font-size:clamp(64px,18vw,104px);line-height:1;}
.success.is-on .success__emoji{animation:success-peek .38s ease both;}
@keyframes success-peek{0%{transform:scale(.92);opacity:.75;}100%{transform:scale(1);opacity:1;}}
.success__word{
  position:relative;
  display:flex;align-items:center;justify-content:center;
  min-height:clamp(200px,62vw,320px); /* reserve room so the ring never overlaps neighbours */
  font-family:var(--font-kana);font-weight:900;
  font-size:clamp(40px,11vw,58px);
  color:var(--ink);
  letter-spacing:.06em;
}
#success-word-text{position:relative;z-index:2;} /* word stays readable inside the ring */
/* the hanamaru ring is drawn AROUND the finished word (transparent centre) */
.stamp{position:absolute;left:50%;top:50%;width:clamp(200px,62vw,320px);height:clamp(200px,62vw,320px);transform:translate(-50%,-50%);pointer-events:none;z-index:1;}
.stamp svg{width:100%;height:100%;}
.stamp.is-stamping{animation:stamp-down .6s cubic-bezier(.2,1.5,.4,1) both;}
@keyframes stamp-down{0%{opacity:0;transform:translate(-50%,-50%) scale(2.4) rotate(-22deg);}55%{opacity:1;transform:translate(-50%,-50%) scale(.86) rotate(4deg);}100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(-6deg);}}
.success__msg{font-family:var(--font-display);font-weight:900;font-size:clamp(28px,8vw,40px);color:var(--hana);margin:0;}
/* ============================================================
   END OF SET
   ============================================================ */
.end{justify-content:center;align-items:center;text-align:center;gap:clamp(16px,3.4vh,30px);}
.end__emoji{font-size:clamp(64px,18vw,104px);animation:bob 3s ease-in-out infinite;}
.end__title{font-family:var(--font-display);font-weight:900;font-size:clamp(38px,11vw,58px);margin:0;color:var(--ink);text-shadow:0 3px 0 #fff;}
.end__count{font-weight:800;color:var(--ink-soft);font-size:clamp(16px,4.4vw,19px);}
.end__hanas{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:88%;}
.end__hanas svg{width:clamp(40px,11vw,56px);height:clamp(40px,11vw,56px);}
.end__actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;}
.btn--soft{background:var(--card);color:var(--ink);box-shadow:0 5px 0 #E7DBC4,0 10px 18px rgba(74,59,46,.12);}
.btn--soft:active{box-shadow:0 2px 0 #E7DBC4;}

/* ============================================================
   PARENT SHEET
   ============================================================ */
.sheet-veil{position:fixed;inset:0;background:rgba(74,59,46,.42);display:none;place-items:center;z-index:40;padding:20px;}
.sheet-veil.is-open{display:grid;animation:screen-in .2s ease both;}
.sheet{
  background:var(--paper);border-radius:26px;box-shadow:var(--shadow-soft);
  width:100%;max-width:360px;padding:24px 22px;text-align:left;
  max-height:calc(100dvh - 40px);overflow-y:auto;overscroll-behavior:contain;
}
.sheet h2{font-family:var(--font-display);font-weight:900;margin:0 0 4px;font-size:22px;color:var(--ink);}
.sheet h2:focus{outline:none;}
.sheet p.note{margin:0 0 18px;color:var(--ink-soft);font-size:13px;line-height:1.5;}
.sheet__row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:2px solid var(--paper-2);}
.sheet__row .k{font-weight:800;color:var(--ink);}
.sheet__row .v{font-weight:800;color:var(--coral-ink);font-size:20px;}
/* toggle */
.toggle{position:relative;width:62px;height:34px;border-radius:999px;border:none;cursor:pointer;background:#D9CDB6;transition:background .18s;}
.toggle.is-on{background:var(--good);}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:28px;height:28px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .18s;}
.toggle.is-on::after{transform:translateX(28px);}
.sheet__close{width:100%;margin-top:18px;font-size:20px;padding:.6em;}

@media (max-height:720px){
  #app{
    padding-top:calc(env(safe-area-inset-top) + 6px);
    padding-bottom:calc(env(safe-area-inset-bottom) + 8px);
  }
  .home{gap:6px;padding-top:38px;padding-bottom:42px;}
  .home__mascot{font-size:clamp(40px,12vw,60px);}
  .home__title{font-size:clamp(28px,7.2vw,38px);line-height:1.06;}
  .home__sub{display:none;}
  .home-modes{gap:6px;}
  .home-mode{min-height:52px;border-radius:15px;padding:4px 3px;}
  .friend-hill{min-height:56px;width:min(94%,360px);}
  .tray{padding:6px 14px;}
  .tray__hanas svg{width:21px;height:21px;}
  .btn--big{font-size:clamp(22px,5.7vw,28px);padding:.56em 1.32em;}
  .quiz[data-mode="cards"] .listen-btn{display:none;}
}

/* ============================================================
   responsive: roomier on tablet / desktop
   ============================================================ */
@media (min-width:560px) and (min-height:680px){
  .tile{max-height:140px;}
  .choices.cols-2{grid-template-columns:repeat(2,minmax(0,140px));}
  .choices.cols-3{grid-template-columns:repeat(3,minmax(0,140px));}
}

/* ============================================================
   reduced motion: keep it calm
   ============================================================ */
@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.06s !important;}
  .home__mascot,.success__emoji,.end__emoji{animation:none !important;}
}
</style>
</head>
<body>
<div id="app">

  <!-- ============ HOME ============ -->
  <section class="screen home is-active" id="screen-home" aria-label="トップ">
    <div class="profile-row" id="profile-row" aria-label="あそぶ ひと"></div>
    <div class="home__mascot" aria-hidden="true">🐥</div>
    <h1 class="home__title">ひらがな<br><span class="t-accent">ことばあそび</span></h1>
    <p class="home__sub">えを みて あそぼう</p>

    <div class="home-modes" id="home-modes" role="group" aria-label="あそびを えらぶ">
      <button class="home-mode" type="button" data-home-mode="cards" aria-pressed="true">
        <span class="home-mode__icon" aria-hidden="true">🃏</span><span class="home-mode__label">ふだ</span>
      </button>
      <button class="home-mode" type="button" data-home-mode="cards3" aria-pressed="false">
        <span class="home-mode__icon" aria-hidden="true">🔤</span><span class="home-mode__label">3もじ</span>
      </button>
      <button class="home-mode" type="button" data-home-mode="trace" aria-pressed="false">
        <span class="home-mode__icon" aria-hidden="true">✏️</span><span class="home-mode__label">てがき</span>
      </button>
      <button class="home-mode" type="button" data-home-mode="clap" aria-pressed="false">
        <span class="home-mode__icon" aria-hidden="true">👏</span><span class="home-mode__label">てびょうし</span>
      </button>
      <button class="home-mode" type="button" data-home-mode="mirror" aria-pressed="false">
        <span class="home-mode__icon" aria-hidden="true">↔</span><span class="home-mode__label">むき</span>
      </button>
      <button class="home-mode" type="button" data-home-mode="teach" aria-pressed="false">
        <span class="home-mode__icon" aria-hidden="true">🐥</span><span class="home-mode__label">おしえる</span>
      </button>
      <button class="home-mode" type="button" data-home-mode="ear" aria-pressed="false">
        <span class="home-mode__icon" aria-hidden="true">👂</span><span class="home-mode__label">おみみ</span>
      </button>
    </div>

    <div class="friend-hill" id="friend-hill" aria-label="ともだちの おか"></div>

    <div class="tray" aria-label="きょうの はなまる">
      <span class="tray__label">きょうの はなまる</span>
      <div class="tray__hanas" id="home-hanas"></div>
    </div>

    <button class="btn btn--big" id="start-btn">はじめる</button>

    <button class="ghost-btn home__parent" id="parent-link" aria-label="お家の方">お家の方</button>
  </section>

  <!-- ============ QUIZ ============ -->
  <section class="screen quiz" id="screen-quiz" aria-label="もんだい">
    <div class="topbar">
      <button class="icon-btn" id="quit-btn" aria-label="おうちへ もどる">🏠</button>
      <div class="progress" id="progress" role="img" aria-label="もんだい"></div>
      <button class="icon-btn" id="mute-btn" aria-label="おとの オン・オフ" aria-pressed="false">🔊</button>
    </div>

    <div class="hint">
      <div class="hint__say"><span class="peep" id="peep" aria-hidden="true">🐥</span><span id="prompt-text">これ な〜に？</span></div>
      <div class="hint__card" id="hint-emoji" role="img" aria-label="ヒント">🐱</div>
      <div class="mouth-cue" id="mouth-cue" aria-hidden="true"></div>
      <button class="listen-btn" id="listen-btn">🔊 もういちど きく</button>
    </div>

    <div class="slots" id="slots" aria-label="こたえの ます"></div>

    <p class="message" id="message" aria-live="polite"></p>

    <!-- card mode -->
    <div class="answer-area" id="cards-area">
      <div class="choices" id="choices" aria-label="ひらがな ふだ"></div>
      <button class="ghost-btn redo" id="redo-btn">↺ やりなおし</button>
    </div>

    <!-- handwriting (trace) mode -->
    <div class="answer-area" id="trace-area" hidden>
      <div class="pad-wrap">
        <canvas id="pad-guide" width="300" height="300" aria-hidden="true"></canvas>
        <canvas id="pad" width="300" height="300" role="img" aria-label="てがき"></canvas>
        <span class="ghost-dot" id="ghost-dot" aria-hidden="true"></span>
        <span class="pad-done" id="pad-done" aria-hidden="true">✓</span>
      </div>
      <div class="trace-actions">
        <button class="ghost-btn redo" id="demo-btn">▶ おてほん</button>
        <button class="ghost-btn redo" id="clear-btn">↺ けす</button>
      </div>
    </div>

    <div class="answer-area clap-area" id="clap-area" hidden>
      <div class="mora-dots" id="mora-dots" aria-hidden="true"></div>
      <button class="clap-btn" id="clap-btn" aria-label="てを たたく">👏</button>
      <button class="ghost-btn redo clap-reset" id="clap-reset">↺ もういちど</button>
    </div>

    <div class="answer-area mirror-area" id="mirror-area" hidden>
      <div class="mirror-choices" id="mirror-choices" aria-label="ただしい むき"></div>
    </div>

    <div class="answer-area ear-area" id="ear-area" hidden>
      <button class="ear-btn" id="ear-btn" aria-label="きいたら タップ">👂</button>
      <button class="ghost-btn redo" id="ear-repeat-btn">🔊 もういちど</button>
    </div>
  </section>

  <!-- ============ SUCCESS ============ -->
  <section class="screen success" id="screen-success" aria-label="せいかい">
    <div class="success__emoji" id="success-emoji" aria-hidden="true">🐱</div>
    <div class="success__word" id="success-word">
      <span id="success-word-text">ねこ</span>
      <span class="stamp" id="stamp" aria-hidden="true"></span>
    </div>
    <p class="success__msg" id="success-msg">できたね！</p>
    <button class="btn btn--next" id="next-btn">つぎへ →</button>
  </section>

  <!-- ============ END OF SET ============ -->
  <section class="screen end" id="screen-end" aria-label="おしまい">
    <div class="end__emoji" aria-hidden="true">🎉</div>
    <h1 class="end__title">おしまい！</h1>
    <p class="end__count" id="end-count">5もん あそんだよ</p>
    <div class="end__hanas" id="end-hanas" aria-hidden="true"></div>
    <div class="end__actions">
      <button class="btn btn--next" id="again-btn">もういちど</button>
      <button class="btn btn--next btn--soft" id="gohome-btn">おうちへ</button>
    </div>
  </section>

  <section class="screen end" id="screen-rest" aria-label="きょうは おしまい">
    <div class="end__emoji" aria-hidden="true">🌙</div>
    <h1 class="end__title">きょうは おしまい</h1>
    <p class="end__count">また あした あそぼうね</p>
    <div class="end__actions">
      <button class="btn btn--next btn--soft" id="rest-home-btn">おうちへ</button>
    </div>
  </section>

</div>

<!-- ============ PARENT SHEET ============ -->
<div class="sheet-veil" id="parent-veil" aria-hidden="true">
  <div class="sheet" id="parent-sheet" role="dialog" aria-modal="true" aria-labelledby="parent-title">
    <h2 id="parent-title" tabindex="-1">お家の方へ</h2>
    <p class="note">4歳向けのことば遊びです。1セットは5問。短く遊べます。</p>
    <div class="sheet__row">
      <span class="k">音</span>
      <button class="toggle is-on" id="sound-toggle" role="switch" aria-checked="true" aria-label="音 オン・オフ"></button>
    </div>
    <div class="sheet__row">
      <span class="k">遊び方</span>
      <div class="mode-seg mode-seg--wrap" id="mode-seg" role="group" aria-label="遊び方">
        <button class="mode-opt" type="button" data-mode="cards" data-card-level="0">🃏 札</button>
        <button class="mode-opt" type="button" data-mode="cards" data-card-level="3">🔤 3文字札</button>
        <button class="mode-opt" type="button" data-mode="trace">✏️ 手書き</button>
        <button class="mode-opt" type="button" data-mode="clap">👏 拍手</button>
        <button class="mode-opt" type="button" data-mode="mirror">↔ 向き</button>
        <button class="mode-opt" type="button" data-mode="teach">🐥 教える</button>
        <button class="mode-opt" type="button" data-mode="ear">👂 聞く</button>
      </div>
    </div>
    <div class="sheet__row sheet__row--stack">
      <span class="k">サポート</span>
      <div class="mode-seg mode-seg--wrap" id="pref-seg" role="group" aria-label="サポート">
        <button class="mode-opt" type="button" data-pref="calm">静か</button>
        <button class="mode-opt" type="button" data-pref="bigTargets">大きい</button>
        <button class="mode-opt" type="button" data-pref="lefty">左手</button>
      </div>
    </div>
    <div class="sheet__row sheet__row--stack">
      <span class="k">遊ぶ時間</span>
      <div class="mode-seg" id="limit-seg" role="group" aria-label="遊ぶ時間の制限">
        <button class="mode-opt" type="button" data-limit="0">なし</button>
        <button class="mode-opt" type="button" data-limit="5">5分</button>
        <button class="mode-opt" type="button" data-limit="10">10分</button>
        <button class="mode-opt" type="button" data-limit="15">15分</button>
      </div>
    </div>
    <div class="sheet__row">
      <span class="k">今日遊んだ時間</span>
      <span class="v" id="stat-playtime">0分</span>
    </div>
    <div class="sheet__row">
      <span class="k">遊んだ問題</span>
      <span class="v" id="stat-played">0</span>
    </div>
    <div class="sheet__row">
      <span class="k">正解</span>
      <span class="v" id="stat-correct">0</span>
    </div>
    <div class="sheet__row sheet__row--stack">
      <span class="k">ことばを追加</span>
      <div class="custom-panel">
        <input id="custom-word" inputmode="kana" maxlength="4" placeholder="かな 2〜4文字" aria-label="かな 2から4文字" />
        <div class="custom-emojis" id="custom-emojis" aria-label="絵を選ぶ"></div>
        <button class="ghost-btn" id="custom-add-btn" type="button">＋ 追加</button>
        <div class="custom-feedback" id="custom-feedback" role="status" aria-live="polite"></div>
        <div class="custom-list" id="custom-list"></div>
      </div>
    </div>
    <div class="sheet__row sheet__row--stack">
      <span class="k">今週</span>
      <div class="trail-chart" id="trail-chart" aria-hidden="true"></div>
      <div class="focus-text" id="focus-text">まだ記録はありません</div>
    </div>
    <div class="sheet__row">
      <span class="k">人を増やす</span>
      <button class="ghost-btn" id="profile-add-btn" type="button">＋</button>

/* ---------- hanamaru SVG (the signature) --------------------
   花丸 = a scalloped flower-circle teachers draw on good work.
   scallop() builds a petal-edged circle path so both shapes are crisp.
------------------------------------------------------------- */
function scallop(cx,cy,r,n,amp){
  let d=`M ${(cx+r).toFixed(1)} ${cy.toFixed(1)} `;
  for(let i=0;i<n;i++){
    const am=((i+0.5)/n)*2*Math.PI, a1=((i+1)/n)*2*Math.PI;
    const cpx=cx+(r+amp)*Math.cos(am), cpy=cy+(r+amp)*Math.sin(am);
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    d+=`Q ${cpx.toFixed(1)} ${cpy.toFixed(1)} ${x1.toFixed(1)} ${y1.toFixed(1)} `;
  }
  return d+"Z";
}

const KANA_SAY = { "は":"ハ", "へ":"ヘ", "を":"ヲ" };
function sayText(text){
  return (text && text.length===1 && KANA_SAY[text]) ? KANA_SAY[text] : text;
}
/* rank ja voices for what the device exposes: iOS has only LOCAL Apple ja voices
   (Kyoko/O-ren/Siri 日本語); desktop/Edge may add Google/Natural. */
function scoreVoice(v){
  const n=(v.name||"").toLowerCase();
  let s=0;
  if(/natural|neural/.test(n)) s+=120;                 // Edge/MS neural (desktop)
  if(/google/.test(n))         s+=80;                  // "Google 日本語" (Chrome/Android)
  if(/online/.test(n))         s+=40;
  if(/kyoko|o-?ren|otoya|siri|hattori|sara/.test(n)) s+=60; // Apple iOS/macOS ja
  if(/nanami|ayumi|sayaka|mayu|aoi|nozomi|keita|masaru|haruka/.test(n)) s+=30;
  if(/^ja-jp$/i.test(v.lang||"")) s+=10;               // exact region over generic "ja"
  if(!v.localService)          s+=2;                   // mild tie-breaker only
  return s;
}
function pickVoice(){
  if(!("speechSynthesis" in window)) return false;
  const ja = speechSynthesis.getVoices().filter(v=>/^ja\b|^ja[-_]/i.test(v.lang));
  if(!ja.length) return false;              // don't null a previously found voice
  ja.sort((a,b)=>scoreVoice(b)-scoreVoice(a));
  jaVoice = ja[0];
  return true;
}
function pickVoiceRetry(tries){             // iOS: getVoices() is empty/late, onvoiceschanged flaky
  if(pickVoice() || tries<=0) return;
  setTimeout(()=>pickVoiceRetry(tries-1), 250);
}
if("speechSynthesis" in window){
  pickVoiceRetry(10);                       // up to ~2.5s
  speechSynthesis.onvoiceschanged = pickVoice;
}

  if(!("speechSynthesis" in window)) return;

  if(speechPrimed || !store.soundOn) return;

    const u = new SpeechSynthesisUtterance(" ");
    u.lang = "ja-JP";
    if(jaVoice) u.voice = jaVoice;
    u.volume = 0;
    speechSynthesis.speak(u);

  }catch(e){}

function speak(text, rate){
  if(!store.soundOn) return;
  if(!("speechSynthesis" in window)) return;
  try{
    if(!jaVoice) pickVoice();              // last-chance resolve (iOS late voices)
    const seq = ++speechSeq;

    const u = new SpeechSynthesisUtterance(sayText(text));
    u.lang = "ja-JP";

    u.rate = rate || 0.95;  // natural speed

    try{ speechSynthesis.resume(); }catch(e){}

let actx = null;
function blip(kind){
  if(!store.soundOn) return;
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==="suspended") actx.resume();
    const now = actx.currentTime;
    const notes = kind==="good" ? (store.calm ? [659] : [523,659,784,1047]) : [440];
    notes.forEach((f,i)=>{
      const o=actx.createOscillator(), g=actx.createGain();
      o.type="sine"; o.frequency.value=f;
      const t=now+i*0.09;

      g.gain.linearRampToValueAtTime(kind==="good"?0.14:0.10, t+0.02);

}

function clusterMates(kana){
  const out = new Set();
  for(const c of LOOKALIKES) if(c.includes(kana)) c.forEach(k=>out.add(k));
  return out;
}
function buildChoices(word){
  const letters = [...new Set(word.split(""))];
  const banned = new Set();
  letters.forEach(l => clusterMates(l).forEach(k => banned.add(k)));
  const need = Math.max(4, Math.min(6, letters.length+2));
  const picked = [];
  for(const k of shuffle(KANA_POOL.filter(k=>!letters.includes(k) && !banned.has(k)))){
    if(picked.some(p => clusterMates(p).has(k))) continue;
    picked.push(k);
    if(letters.length + picked.length >= need) break;
  }
  const out = letters.concat(picked);
  if(out.length < need){
    for(const k of shuffle(KANA_POOL.filter(x=>!out.includes(x)))){
      out.push(k);
      if(out.length >= need) break;
    }
  }
  return out.slice(0, need);
}
function validCustomWord(word){
  return /^[あ-ん]{2,4}$/.test(word) && [...word].every(ch=>KANA_POOL.includes(ch));
}

function vowelOf(kana){

  if("えけせてねへめれ".includes(kana)) return "e";
  return "o";
}

function bindPreview(el, textFn){

  el.addEventListener("pointerdown", e=>{
    previewed=false;
    timer=setTimeout(()=>{
      previewed=true; suppressClick=true;
      const t=typeof textFn==="function"?textFn():(el.dataset.previewText || textFn);
      if(t && t.length===1) speakKana(t); else if(t) speak(t);
    }, 450);
  });
  const cancel=()=>{ if(timer){ clearTimeout(timer); timer=null; } setTimeout(()=>{ if(previewed) suppressClick=false; }, 80); };
  el.addEventListener("pointerup", cancel);
  el.addEventListener("pointerleave", cancel);
  el.addEventListener("pointercancel", cancel);
  el.addEventListener("contextmenu", e=>e.preventDefault());
  el.addEventListener("click", e=>{
    if(previewed){ e.preventDefault(); e.stopImmediatePropagation(); previewed=false; }
  }, true);
}
function startDwell(el, letter){
  if(!store.bigTargets || locked) return false;

  }, 700);

    clearTimeout(timer); el.classList.remove("is-dwell");
    setTimeout(()=>{ if(done) suppressClick=false; }, 100);
    el.removeEventListener("pointerup", cancel);
    el.removeEventListener("pointerleave", cancel);
    el.removeEventListener("pointercancel", cancel);
  };
  el.addEventListener("pointerup", cancel);
  el.addEventListener("pointerleave", cancel);
  el.addEventListener("pointercancel", cancel);
  return true;
}

/* ---------- build a set ------------------------------------- */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function buildSet(){
  // gentle ramp for normal cards; 3-letter cards are an explicit child-selected mode
  const words = allWords();
  const threeCardMode = store.mode==="cards" && store.cardLevel===3;
  const customWords = (store.customWords||[]).map(w=>Object.assign({level:1, custom:true}, w));
  const custom = shuffle(threeCardMode ? customWords.filter(w=>w.word.length===3) : customWords);
  const byLvl = {1:shuffle(words.filter(w=>w.level===1)),
                 2:shuffle(words.filter(w=>w.level===2)),
                 3:shuffle(words.filter(w=>w.level===3))};
  const plan = threeCardMode ? [3,3,3,3,3] : [1,1,2,2,3]; // difficulty per question in the set
  const used = new Set();
  const out = [];
  if(custom.length){
    const w=custom[0]; used.add(w.id); out.push(w);
  }
  for(const lvl of plan){
    if(out.length>=SET_SIZE) break;
    let pool = byLvl[lvl].filter(w=>!used.has(w.id));
    if(pool.length===0){ // fall back to any unused
      pool = shuffle(words.filter(w=>!used.has(w.id) && (!threeCardMode || w.word.length===3)));
    }
    const w = pool[0];
    used.add(w.id);
    out.push(w);
  }
  return out;
}

/* ---------- handwriting (trace) mode ------------------------ */
function traceFont(){
  return '700 200px "UD Digi Kyokasho NK-R","UD Digi Kyokasho N-R","UD デジタル 教科書体 NK-R","UD デジタル 教科書体 N-R","Yu Kyokasho","YuKyokasho","游教科書体","Hiragino Maru Gothic ProN","M PLUS Rounded 1c",system-ui,sans-serif';
}
function traceStrokes(ch){
  return TRACE_PATTERNS[TRACE_PATH_MAP[ch]] || TRACE_PATTERNS.loop;
}
function setTraceGlyphStyle(ctx, color){
  ctx.fillStyle=color;
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.font=traceFont();
}
function drawTraceGuide(ch, color){
  padGuideCtx.clearRect(0,0,PAD,PAD);
  setTraceGlyphStyle(padGuideCtx, color || "#E8DCC6");
  padGuideCtx.fillText(ch, PAD/2, PAD/2+6);
}
function segmentLen(a,b){
  const dx=b[0]-a[0], dy=b[1]-a[1];
  return Math.hypot(dx, dy);
}
function strokeLen(stroke){
  let len=0;
  for(let i=1;i<stroke.length;i++) len += segmentLen(stroke[i-1], stroke[i]);
  return len;
}
function pointOnTrace(strokes, t){
  const lengths = strokes.map(strokeLen);
  const total = Math.max(1, lengths.reduce((a,b)=>a+b, 0));
  let remain = total * Math.max(0, Math.min(1, t));
  for(let si=0; si<strokes.length; si++){
    const stroke = strokes[si];
    for(let i=1;i<stroke.length;i++){
      const a=stroke[i-1], b=stroke[i], len=segmentLen(a,b);
      if(remain <= len){
        const k = len ? remain/len : 0;
        return [a[0]+(b[0]-a[0])*k, a[1]+(b[1]-a[1])*k];
      }
      remain -= len;
    }
  }
  const lastStroke = strokes[strokes.length-1];
  return lastStroke[lastStroke.length-1];
}
function drawTraceProgress(ctx, strokes, t){
  const lengths = strokes.map(strokeLen);
  const total = Math.max(1, lengths.reduce((a,b)=>a+b, 0));
  let remain = total * Math.max(0, Math.min(1, t));
  ctx.save();
  ctx.strokeStyle="rgba(255,122,89,.58)";
  ctx.lineWidth=22;
  ctx.lineCap="round";
  ctx.lineJoin="round";
  for(let si=0; si<strokes.length && remain>0; si++){
    const stroke = strokes[si];
    if(!stroke.length) continue;
    ctx.beginPath();
    ctx.moveTo(stroke[0][0], stroke[0][1]);
    for(let i=1;i<stroke.length;i++){
      const a=stroke[i-1], b=stroke[i], len=segmentLen(a,b);
      if(remain >= len){
        ctx.lineTo(b[0], b[1]);
        remain -= len;
      }else{
        const k = len ? remain/len : 0;
        ctx.lineTo(a[0]+(b[0]-a[0])*k, a[1]+(b[1]-a[1])*k);
        remain = 0;
        break;
      }
    }
    ctx.stroke();
  }
  ctx.restore();
}
function stopTraceDemo(){
  if(traceDemoTimer){ clearTimeout(traceDemoTimer); traceDemoTimer=null; }
  if(traceDemoFrame){ cancelAnimationFrame(traceDemoFrame); traceDemoFrame=null; }

function clearTraceHelp(){

function reinforceTraceGuide(ch){

function stillThisTraceChar(ch){

function startTraceHelp(ch){

function traceMatches(coverage, overflow, precision, ch){
  const relaxed   = traceAttempts >= TRACE_RELAX_ATTEMPTS;
  const coverNeed = relaxed ? TRACE_COVER_RELAXED : COVER_OK;
  const needStr   = relaxed ? 1 : strokesNeededFor(ch);   // rescue: 1 stroke when struggling
  return committedStrokes >= needStr &&
         coverage >= coverNeed && overflow <= OVERFLOW_MAX && precision >= PRECISION_OK;
}
function noteTraceAttempt(){
  traceAttempts++;
  const ch = current.word[selected.length];
  reinforceTraceGuide(ch);
  if(traceAttempts >= TRACE_AUTO_ATTEMPTS){
    $("message").textContent = "いっしょに かこう";
    speak("いっしょに かこう", 0.85);
    acceptTraceChar();
    return;
  }
  if(traceAttempts >= TRACE_RELAX_ATTEMPTS){
    $("message").textContent = "ゆっくり なぞろう";
    speak("ゆっくり なぞろう", 0.85);
  }else{
    $("message").textContent = "もうすこし なぞってね";

function setupTraceChar(speakIt){
  const ch = current.word[selected.length];
  traceBusy=false; drawing=false;
  traceAttempts = 0; committedStrokes = 0;
  clearTraceHelp();
  // visible faint guide
  drawTraceGuide(ch, "#E8DCC6");
  // offscreen solid render -> sample the glyph pixels we want covered
  const off=document.createElement("canvas"); off.width=PAD; off.height=PAD;
  const oc=off.getContext("2d",{willReadFrequently:true});
  setTraceGlyphStyle(oc, "#000");
  oc.fillText(ch, PAD/2, PAD/2+6);
  const g=oc.getImageData(0,0,PAD,PAD).data;
  guidePts=[];
  for(let y=0;y<PAD;y+=4){ for(let x=0;x<PAD;x+=4){ if(g[(y*PAD+x)*4+3]>40) guidePts.push([x,y]); } }
  guideArea=guidePts.length;
  const GW=PAD/4, TOL=5;
  guideMask = new Uint8Array(GW*GW);
  for(const [gx,gy] of guidePts){
    const cx=gx/4|0, cy=gy/4|0;
    for(let dy=-TOL;dy<=TOL;dy++){
      for(let dx=-TOL;dx<=TOL;dx++){
        const nx=cx+dx, ny=cy+dy;
        if(nx>=0 && nx<GW && ny>=0 && ny<GW) guideMask[ny*GW+nx]=1;
      }
    }
  }
  // reset ink layer
  padCtx.clearRect(0,0,PAD,PAD);
  padCtx.lineWidth=BRUSH; padCtx.lineCap="round"; padCtx.lineJoin="round";
  padCtx.strokeStyle="#FF7A59";
  $("pad-done").classList.remove("is-on");
  $("message").textContent = "「"+ch+"」を ゆびで かいてね";
  startTraceHelp(ch);
  const reduceMotion = store.calm || (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches);
  if(!reduceMotion) traceDemoTimer=setTimeout(()=>playTraceDemo(true), 280);
  if(speakIt) speak(ch+"、かいてね", 0.85);
}
function playTraceDemo(silent){
  if(!current) return;
  stopTraceDemo();
  const ch=current.word[selected.length] || current.word[0];
  const strokes=traceStrokes(ch);
  const duration=Math.max(1100, 650 + strokes.reduce((sum,s)=>sum+strokeLen(s), 0)*2.1);
  const dot=$("ghost-dot");
  dot.classList.add("is-on");
  if(!silent) speak(ch+"、おてほん", 0.85);
  const start=performance.now();
  const step=(now)=>{
    const t=Math.min(1, (now-start)/duration);
    const p=pointOnTrace(strokes, t);
    const r=$("pad").getBoundingClientRect();
    const scale=r.width/PAD;
    const fadeIn=Math.min(1, t/.08);
    const fadeOut=t>.92 ? Math.max(0, (1-t)/.08) : 1;
    drawTraceGuide(ch, "#E8DCC6");
    drawTraceProgress(padGuideCtx, strokes, t);
    dot.style.opacity=String(Math.min(fadeIn, fadeOut));
    dot.style.transform="translate("+(p[0]*scale-11).toFixed(1)+"px,"+(p[1]*scale-11).toFixed(1)+"px) scale("+(0.82+Math.min(1,t*6)*0.18).toFixed(2)+")";
    if(t<1) traceDemoFrame=requestAnimationFrame(step);
    else{
      traceDemoFrame=null;
      dot.classList.remove("is-on");
      dot.style.opacity="";
      drawTraceGuide(ch, "#FFD79A");
    }
  };
  traceDemoFrame=requestAnimationFrame(step);
}
function padPos(e){
  const r=$("pad").getBoundingClientRect();
  return [ (e.clientX-r.left)*(PAD/r.width), (e.clientY-r.top)*(PAD/r.height) ];
}
function padDown(e){
  if(traceBusy) return;
  stopTraceDemo();
  drawing=true; curStrokeLen=0;
  try{ $("pad").setPointerCapture(e.pointerId); }catch(_){}
  const p=padPos(e); lastXY=p;
  padCtx.beginPath(); padCtx.moveTo(p[0],p[1]); padCtx.lineTo(p[0]+0.1,p[1]); padCtx.stroke(); // a dot
  e.preventDefault();
}
function padMove(e){
  if(!drawing) return;
  const p=padPos(e);
  curStrokeLen += Math.hypot(p[0]-lastXY[0], p[1]-lastXY[1]);
  padCtx.beginPath(); padCtx.moveTo(lastXY[0],lastXY[1]); padCtx.lineTo(p[0],p[1]); padCtx.stroke();
  lastXY=p;
  e.preventDefault();
}
function padUp(){
  if(!drawing) return;
  drawing=false;
  if(curStrokeLen < TRACE_MIN_STROKE_PX){      // stray/brief tap: erase its dot, don't count a stroke
    const r=BRUSH/2+2;
    padCtx.clearRect(lastXY[0]-r, lastXY[1]-r, r*2, r*2);
    return;
  }
  committedStrokes++;
  checkTrace();
}
function padCancel(){            // iOS palm / multi-touch / scroll: end stroke without committing or scoring
  drawing=false; curStrokeLen=0;
}
function checkTrace(){
  if(traceBusy || !guideArea) return;
  const ch=current.word[selected.length];
  const d=padCtx.getImageData(0,0,PAD,PAD).data;
  const GW=PAD/4;
  const inkMask = new Uint8Array(GW*GW);
  let covered=0, ink=0, inside=0;
  for(let y=0;y<PAD;y+=4){ for(let x=0;x<PAD;x+=4){
    if(d[(y*PAD+x)*4+3]>40){
      ink++;
      const cx=x/4|0, cy=y/4|0;
      if(guideMask && guideMask[cy*GW+cx]) inside++;
      for(let dy=-2;dy<=2;dy++){
        for(let dx=-2;dx<=2;dx++){
          const nx=cx+dx, ny=cy+dy;
          if(nx>=0 && nx<GW && ny>=0 && ny<GW) inkMask[ny*GW+nx]=1;
        }
      }
    }
  } }
  for(let i=0;i<guidePts.length;i++){
    const x=guidePts[i][0]/4|0, y=guidePts[i][1]/4|0;
    if(inkMask[y*GW+x]) covered++;
  }
  const coverage=covered/guideArea, overflow=ink/guideArea;
  const precision=ink?inside/ink:0;
  if(traceMatches(coverage, overflow, precision, ch)){
    acceptTraceChar();
  } else if(committedStrokes < strokesNeededFor(ch)){
    $("message").textContent = "つぎの せん かこう";   // gentle: draw the next stroke (no red X)
  }
}
function acceptTraceChar(){
  clearTraceHelp();
  traceBusy=true;
  committedStrokes=0;
  const ch=current.word[selected.length];
  const willComplete = selected.length + 1 === current.word.length;
  selected.push(ch);
  blip("good");
  if(!willComplete) speakKana(ch);
  setPeepMood("peek");
  const dn=$("pad-done"); dn.classList.remove("is-on"); void dn.offsetWidth; dn.classList.add("is-on");
  renderSlots(true);
  scheduleSolve(()=>{
    if(selected.length===current.word.length) onCorrect();
    else setupTraceChar(true);
  }, 650);
}

/* ---------- interaction ------------------------------------- */
function tapLetter(letter){
  if(locked) return;
  if(selected.length >= current.word.length) return;
  const next = selected.concat(letter);
  const willBeCorrect = next.length === current.word.length && next.join("") === current.word;
  selected.push(letter);
  blip("tap");
  speakKana(letter);
  setPeepMood("peek");
  renderSlots(true);
  updateHintGlow();
  if(selected.length === current.word.length){
    locked = true;
    scheduleSolve(judge, 760);
  }
}
function removeAt(i){
  if(locked) return;
  selected.splice(i,1);
  blip("tap");
  renderSlots(false);
  updateHintGlow();
}
function judge(){
  if(selected.join("") === current.word){
    onCorrect();
  }else{
    onWrong();
  }
}
function onWrong(){
  wrongCount++;
  const slots=$("slots");
  slots.classList.add("is-wrong");
  const msg = MSG_WRONG[Math.min(wrongCount-1, MSG_WRONG.length-1)];
  $("message").textContent = msg;
  speak(msg);
  let keep = 0;
  while(keep < selected.length && selected[keep] === current.word[keep]) keep++;
  recordMiss(current.word[keep]);
  setPeepMood("think");
  setTimeout(()=>{
    slots.classList.remove("is-wrong");
    selected = selected.slice(0, keep);
    renderSlots(false);
    updateHintGlow();
    focusNextHint();
    locked = false;
  }, 620);
}
function onCorrect(){
  if(!screens.quiz.classList.contains("is-active")) return;
  store.correct++;
  store.todayStamps++; setStamps++;
  if(current && !store.friends.includes(current.id)){
    store.friends.push(current.id);
    store.lastFriend = current.id;
  }
  saveStore();
  blip("good");
  setPeepMood("happy");
  showSuccess();
}

/* ---------- success ----------------------------------------- */
function showSuccess(){
  $("success-emoji").textContent = current.emoji;
  $("success-word-text").textContent = current.word;
  bindPreview($("success-word-text"), current.word);
  $("success-msg").textContent = MSG_RIGHT[Math.floor(Math.random()*MSG_RIGHT.length)];
  const stamp=$("stamp"); stamp.innerHTML = hanaRing(); stamp.classList.remove("is-stamping");
  const scr=$("screen-success"); scr.classList.remove("is-on");
  show("success");
  // retrigger the single hanamaru stamp animation
  void scr.offsetWidth;
  requestAnimationFrame(()=>{
    stamp.classList.add("is-stamping");
    scr.classList.add("is-on");
  });
  setTimeout(()=>speak(current.word), 360);
}

function nextQuestion(){
  checkpointPlay();
  qIndex++;
  if(qIndex >= SET_SIZE){ showEnd(); }
  else if(timeUp()){ showRest(); }
  else { loadQuestion(); }
}

/* ---------- end of set -------------------------------------- */
function renderHanaRow(el, count, cap){
  el.innerHTML="";
  const n = Math.min(count, cap);
  for(let i=0;i<n;i++){ const s=document.createElement("span"); s.innerHTML=hanaBadge(); el.appendChild(s.firstChild); }
  if(count>cap){ const m=document.createElement("span"); m.className="tray__more"; m.textContent="＋"+(count-cap); el.appendChild(m); }
}
function showEnd(){
  stopPlayClock();
  recordSetHistory();
  $("end-count").textContent = SET_SIZE+"もん あそんだよ";
  renderHanaRow($("end-hanas"), setStamps, 5);
  show("end");
  setTimeout(()=>speak("よく できました"), 300);
}
function recordSetHistory(){
  store.history.push({
    date:todayStr(), played:queue.length || SET_SIZE, correct:setStamps,
    misses:setMisses.slice(-8)
  });
  store.history = store.history.slice(-20);
  saveStore();
}
function showRest(){
  stopPlayClock();
  clearSolveTimer();
  clearTraceHelp();
  locked=false; drawing=false; traceBusy=false;
  show("rest");
  setTimeout(()=>speak("きょうは おしまい。また あした"), 300);
}

/* ---------- home -------------------------------------------- */
function hashPos(id, max){
  let h=0; for(let i=0;i<id.length;i++) h=(h*31+id.charCodeAt(i))>>>0;
  return h%max;
}
function renderProfiles(){
  const row=$("profile-row"); row.innerHTML="";
  profiles.items.forEach(p=>{
    const b=document.createElement("button");
    b.type="button"; b.className="profile-btn"+(p.id===activeProfileId?" is-on":"");
    b.textContent=p.emoji; b.setAttribute("aria-label","あそぶ ひと");
    b.addEventListener("click",()=>switchProfile(p.id));
    row.appendChild(b);
  });
}
function switchProfile(id){
  if(id===activeProfileId) return;
  stopSpeaking(); stopPlayClock(); clearSolveTimer(); clearTraceHelp();
  activeProfileId=id; saveProfiles();
  store=loadStore(); saveStore();
  applyMuteUi(); applyModeUi(); applyLimitUi(); applyPrefs();
  renderHome(); show("home");
}
function renderHill(){
  const hill=$("friend-hill"); hill.innerHTML="";
  const ids=(store.friends||[]).slice(-12);
  const perRow = 6;
  const topRows = Math.ceil(ids.length / perRow);
  ids.forEach((id,i)=>{
    const w=wordById(id); if(!w) return;
    const b=document.createElement("button");
    b.type="button"; b.className="friend"+(store.lastFriend===id?" is-new":"");
    const row = Math.floor(i / perRow);
    const col = i % perRow;
    const rowCount = Math.min(perRow, ids.length - row * perRow);
    const x = rowCount===1 ? 45 : 8 + col * (84 / (rowCount - 1));
    const y = topRows===1 ? 33 : (row===0 ? 10 : 55);
    b.textContent=w.emoji; b.style.left=x+"%"; b.style.top=y+"%";
    b.setAttribute("aria-label", w.word);
    b.addEventListener("click",()=>speak(w.word));
    hill.appendChild(b);
  });
  store.lastFriend=""; saveStore();
}
function renderHome(){
  renderProfiles();
  renderHill();
  applyHomeModeUi();
  const box=$("home-hanas");
  box.innerHTML="";
  if(store.todayStamps===0){
    const e=document.createElement("span"); e.className="tray__none"; e.textContent="まだ ないよ";
    box.appendChild(e); return;
  }
  renderHanaRow(box, store.todayStamps, 8);
}
function startSet(){
  // a tap unlocks audio context / speech on mobile
  clearSolveTimer();
  primeSpeech();
  if(actx && actx.state==="suspended") actx.resume();
  if(timeUp()){ showRest(); return; }
  queue = buildSet(); qIndex=0; setStamps=0; setMisses=[];
  startPlayClock();
  loadQuestion();
}
function goHome(){
  stopSpeaking();
  stopPlayClock();
  clearSolveTimer();
  clearTraceHelp();
  locked=false; drawing=false; traceBusy=false;
  renderHome(); show("home");
}

/* ---------- sound + parent sheet ---------------------------- */
function applyMuteUi(){
  const mb=$("mute-btn");
  mb.textContent = store.soundOn ? "🔊" : "🔇";
  mb.classList.toggle("is-muted", !store.soundOn);
  mb.setAttribute("aria-pressed", String(!store.soundOn)); /* pressed = muted */
  const tg=$("sound-toggle");
  tg.classList.toggle("is-on", store.soundOn);
  tg.setAttribute("aria-checked", String(store.soundOn));
}
function toggleSound(){
  store.soundOn = !store.soundOn; saveStore(); applyMuteUi();
  if(!store.soundOn) stopSpeaking();
}
function applyLimitUi(){
  document.querySelectorAll("#limit-seg .mode-opt").forEach(b=>{
    const on = Number(b.dataset.limit) === store.limitMin;
    b.classList.toggle("is-on", on);
    b.setAttribute("aria-pressed", String(on));
  });
}
function applyPrefUi(){
  document.querySelectorAll("#pref-seg .mode-opt").forEach(b=>{
    const on = !!store[b.dataset.pref];
    b.classList.toggle("is-on", on);
    b.setAttribute("aria-pressed", String(on));
  });
  applyPrefs();
}
function renderCustomEmojis(){
  const box=$("custom-emojis"); box.innerHTML="";
  CUSTOM_EMOJIS.forEach((e,i)=>{
    const b=document.createElement("button");
    b.type="button"; b.className="custom-emoji"+(i===0?" is-on":""); b.textContent=e; b.dataset.emoji=e;
    b.addEventListener("click",()=>{
      document.querySelectorAll(".custom-emoji").forEach(x=>x.classList.remove("is-on"));
      b.classList.add("is-on");
    });
    box.appendChild(b);
  });
}
function renderCustomList(){
  const box=$("custom-list"); box.innerHTML="";
  (store.customWords||[]).slice(-6).forEach(w=>{
    const s=document.createElement("span");
    s.textContent=w.emoji+" "+w.word;
    box.appendChild(s);
  });
}
function setCustomFeedback(text){
  $("custom-feedback").textContent = text || "";
}
function addCustomWord(){
  const input=$("custom-word");
  const word=(input.value||"").trim();
  const emoji=(document.querySelector(".custom-emoji.is-on")||{}).dataset?.emoji || "⭐";
  if(!validCustomWord(word)){
    setCustomFeedback("かな2〜4文字で入力してください");
    return;
  }
  const sameEmoji = (store.customWords||[]).find(w=>w.emoji===emoji && w.word!==word);
  if(sameEmoji){
    setCustomFeedback(emoji+" は "+sameEmoji.word+" で使っています");
    return;
  }
  const id="custom-"+Date.now()+"-"+word;
  store.customWords.push({id, word, emoji, level:1, choices:buildChoices(word)});
  store.customWords=store.customWords.slice(-12);
  input.value="";
  saveStore();
  renderCustomList();
  setCustomFeedback(word+" を追加しました");
}
function addProfile(){
  if(profiles.items.length>=3) return;
  const id="p"+Date.now();
  const emoji=PROFILE_EMOJIS[profiles.items.length%PROFILE_EMOJIS.length];
  profiles.items.push({id, emoji});
  activeProfileId=id; saveProfiles();
  store=loadStore(); saveStore();
  applyMuteUi(); applyModeUi(); applyLimitUi(); applyPrefUi(); renderHome();
}
function renderTrail(){
  const chart=$("trail-chart");
  const hist=(store.history||[]).slice(-7);
  if(!hist.length){
    chart.innerHTML="";
    $("focus-text").textContent="まだ記録はありません";
    return;
  }
  const pts=hist.map((h,i)=>{
    const x=8+i*(104/Math.max(1,hist.length-1));
    const y=34-(Math.max(0,Math.min(1,h.correct/Math.max(1,h.played)))*26);
    return x.toFixed(1)+","+y.toFixed(1);
  }).join(" ");
  chart.innerHTML='<svg viewBox="0 0 120 42" aria-hidden="true"><polyline points="'+pts+'" fill="none" stroke="#5FB872" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><line x1="6" y1="35" x2="114" y2="35" stroke="#E8DCC6" stroke-width="3"/></svg>';
  const misses=Object.entries(store.misses||{}).sort((a,b)=>b[1]-a[1]).slice(0,3).map(x=>x[0]).join("・");
  $("focus-text").textContent=misses ? "もう少し: "+misses : "今週はよくできています";
}
let parentTrap = null;
let parentReturnFocus = null;
function openParents(){
  if(parentTrap){ document.removeEventListener("keydown", parentTrap, true); parentTrap = null; }
  checkpointPlay();
  $("stat-played").textContent = store.played;
  $("stat-correct").textContent = store.correct;
  $("stat-playtime").textContent = formatPlaytime();
  applyMuteUi();
  applyLimitUi();
  applyModeUi();
  applyPrefUi();
  renderCustomList();
  renderTrail();
  parentReturnFocus = (document.activeElement instanceof HTMLElement) ? document.activeElement : $("parent-link");
  $("parent-veil").classList.add("is-open");
  $("parent-veil").setAttribute("aria-hidden","false");
  $("app").inert = true;
  $("app").setAttribute("aria-hidden","true");
  document.body.classList.add("modal-open");
  const sheet = $("parent-sheet");
  sheet.scrollTop = 0;
  requestAnimationFrame(()=>{
    sheet.scrollTop = 0;
    try{ $("parent-title").focus({preventScroll:true}); }
    catch(e){ $("parent-title").focus(); }
  });
  parentTrap = (e)=>{
    if(e.key !== "Tab") return;
    const nodes = $("parent-veil").querySelectorAll(
      'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
    );
    const list = Array.prototype.filter.call(nodes, el => !el.disabled && el.offsetParent !== null);
    if(!list.length){ e.preventDefault(); return; }
    const first = list[0], last = list[list.length-1];
    if(e.shiftKey && document.activeElement === first){
      e.preventDefault(); last.focus();
    }else if(!e.shiftKey && document.activeElement === last){
      e.preventDefault(); first.focus();
    }
  };
  document.addEventListener("keydown", parentTrap, true);
}
function closeParents(){
  const wasOpen = $("parent-veil").classList.contains("is-open");
  $("parent-veil").classList.remove("is-open");
  $("parent-veil").setAttribute("aria-hidden","true");
  $("app").inert = false;
  $("app").removeAttribute("aria-hidden");
  document.body.classList.remove("modal-open");
  if(parentTrap){ document.removeEventListener("keydown", parentTrap, true); parentTrap = null; }
  const target = parentReturnFocus || $("parent-link");
  parentReturnFocus = null;
  if(wasOpen && target && typeof target.focus === "function") target.focus();
}

/* ---------- wire up ----------------------------------------- */

$("listen-btn").addEventListener("click", ()=>speak(current.word));

$("mute-btn").addEventListener("click", toggleSound);

  if(locked || store.mode!=="cards") return;

});
$("next-btn").addEventListener("click", ()=>{

  navLock = true;
  nextQuestion();
  setTimeout(()=>{ navLock = false; }, 400);
});

$("gohome-btn").addEventListener("click", goHome);
$("rest-home-btn").addEventListener("click", goHome);

$("clap-reset").addEventListener("click", ()=>{

  clapCount=0; updateClap(); $("message").textContent="";
});
$("ear-btn").addEventListener("click", ()=>{
  if(locked) return;

});

/* play-mode selector */
function currentHomeModeKey(){
  if(store.mode==="cards" && store.cardLevel===3) return "cards3";
  return Object.keys(HOME_MODE_OPTIONS).find(k=>k!=="cards3" && HOME_MODE_OPTIONS[k].mode===store.mode) || "cards";
}
function applyHomeModeUi(){
  const key = currentHomeModeKey();
  document.querySelectorAll("#home-modes .home-mode").forEach(b=>{
    const on = b.dataset.homeMode===key;
    b.classList.toggle("is-on", on);
    b.setAttribute("aria-pressed", String(on));
  });
}
function applyModeUi(){
  document.querySelectorAll("#mode-seg .mode-opt").forEach(b=>{
    const cardLevel = Number(b.dataset.cardLevel || 0);
    const on=b.dataset.mode===store.mode && (b.dataset.mode!=="cards" || cardLevel===store.cardLevel);
    b.classList.toggle("is-on", on);
    b.setAttribute("aria-pressed", String(on));
  });
  applyHomeModeUi();
}
function chooseHomeMode(key){
  const opt = HOME_MODE_OPTIONS[key];
  if(!opt) return;
  store.mode = opt.mode;
  store.cardLevel = opt.cardLevel || 0;
  saveStore();
  applyModeUi();
}
document.querySelectorAll("#home-modes .home-mode").forEach(b=>{
  b.addEventListener("click",()=>chooseHomeMode(b.dataset.homeMode));
});
document.querySelectorAll("#mode-seg .mode-opt").forEach(b=>{
  b.addEventListener("click",()=>{
    store.mode=b.dataset.mode;
    store.cardLevel=Number(b.dataset.cardLevel || 0);
    if(store.mode!=="cards") store.cardLevel=0;
    saveStore();
    applyModeUi();
  });
});
document.querySelectorAll("#limit-seg .mode-opt").forEach(b=>{
  b.addEventListener("click",()=>{
    store.limitMin = Number(b.dataset.limit);
    saveStore();
    applyLimitUi();
    $("stat-playtime").textContent = formatPlaytime();
  });
});
document.querySelectorAll("#pref-seg .mode-opt").forEach(b=>{
  b.addEventListener("click",()=>{
    const key=b.dataset.pref;
    store[key] = !store[key];
    saveStore();
    applyPrefUi();
  });
});
$("custom-add-btn").addEventListener("click", addCustomWord);
$("profile-add-btn").addEventListener("click", addProfile);
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden) stopPlayClock();
  else if(playScreenActive()) startPlayClock();
});

/* handwriting canvas */
function initPad(){
  padCtx=$("pad").getContext("2d",{willReadFrequently:true});
  padGuideCtx=$("pad-guide").getContext("2d");
  const pad=$("pad");
  pad.addEventListener("pointerdown", padDown);
  pad.addEventListener("pointermove", padMove);
  pad.addEventListener("pointerup", padUp);
  pad.addEventListener("pointercancel", padCancel);
}
$("clear-btn").addEventListener("click",()=>{
  if(traceBusy) return;
  padCtx.clearRect(0,0,PAD,PAD);
  committedStrokes=0;
  noteTraceAttempt();
});

/* ---------- go ---------------------------------------------- */
initPad();
renderCustomEmojis();
applyMuteUi();
applyModeUi();
applyLimitUi();
applyPrefUi();
renderHome();
show("home");
