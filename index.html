<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#FFFBF2" />
<title>ひらがな ことばあそび</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88'>🐥</text></svg>" />
<!-- standalone web-app hints (home-screen launch without browser chrome) -->
<!-- "offline" here = browser HTTP cache + system maru-gothic font fallback only.
     A true offline PWA will be handled by a service worker in a later phase.
     This phase keeps the current browser HTTP-cache fallback. -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="ひらがな" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="application-name" content="ひらがな" />
<!-- apple-touch-icon intentionally omitted: iOS requires a PNG. The web
     manifest uses an SVG icon; iOS will auto-snapshot until a PNG is added. -->
<link rel="manifest" href="./assets/manifest.webmanifest" />

<!-- Rounded Japanese display + UI faces (progressive enhancement; system maru-gothic fallback below) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="./styles.css" />
</head>
<body>
<div id="app">

  <!-- ============ HOME ============ -->
  <section class="screen home is-active" id="screen-home" aria-label="トップ">
    <div class="profile-row" id="profile-row" aria-label="あそぶ ひと"></div>
    <div class="home__mascot" aria-hidden="true">🐥</div>
    <h1 class="home__title">ひらがな<br><span class="t-accent">ことばあそび</span></h1>
    <p class="home__sub">えを みて あそぼう</p>

    <div class="home-modes" id="home-modes" role="group" aria-label="あそびを えらぶ">
      <button class="home-mode" type="button" data-home-mode="cards" aria-pressed="true">
        <span class="home-mode__icon" aria-hidden="true">🃏</span><span class="home-mode__label">ふだ</span>
      </button>
      <button class="home-mode" type="button" data-home-mode="cards3" aria-pressed="false">
        <span class="home-mode__icon" aria-hidden="true">🔤</span><span class="home-mode__label">3もじ</span>
      </button>
      <button class="home-mode" type="button" data-home-mode="trace" aria-pressed="false">
        <span class="home-mode__icon" aria-hidden="true">✏️</span><span class="home-mode__label">てがき</span>
      </button>
      <button class="home-mode" type="button" data-home-mode="clap" aria-pressed="false">
        <span class="home-mode__icon" aria-hidden="true">👏</span><span class="home-mode__label">たたく</span>
      </button>
      <button class="home-mode" type="button" data-home-mode="mirror" aria-pressed="false">
        <span class="home-mode__icon" aria-hidden="true">↔</span><span class="home-mode__label">むき</span>
      </button>
      <button class="home-mode" type="button" data-home-mode="teach" aria-pressed="false">
        <span class="home-mode__icon" aria-hidden="true">💬</span><span class="home-mode__label">おしえる</span>
      </button>
      <button class="home-mode" type="button" data-home-mode="ear" aria-pressed="false">
        <span class="home-mode__icon" aria-hidden="true">👂</span><span class="home-mode__label">おみみ</span>
      </button>
    </div>

    <div class="friend-hill" id="friend-hill" aria-label="ともだちの おか"></div>

    <div class="tray" aria-label="きょうの はなまる">
      <span class="tray__label">きょうの はなまる</span>
      <div class="tray__hanas" id="home-hanas"></div>
    </div>

    <button class="btn btn--big" id="start-btn">はじめる</button>

    <button class="ghost-btn home__parent" id="parent-link" aria-label="お家の方">お家の方</button>
  </section>

  <!-- ============ QUIZ ============ -->
  <section class="screen quiz" id="screen-quiz" aria-label="もんだい">
    <div class="topbar">
      <button class="icon-btn" id="quit-btn" aria-label="おうちへ もどる">🏠</button>
      <div class="progress" id="progress" role="img" aria-label="もんだい"></div>
      <button class="icon-btn" id="mute-btn" aria-label="おとの オン・オフ" aria-pressed="false">🔊</button>
    </div>

    <div class="hint">
      <div class="hint__say"><span class="peep" id="peep" aria-hidden="true">🐥</span><span id="prompt-text">これ な〜に？</span></div>
      <div class="hint__card" id="hint-emoji" role="img" aria-label="ヒント">🐱</div>
      <div class="mouth-cue" id="mouth-cue" aria-hidden="true"></div>
      <button class="listen-btn" id="listen-btn">🔊 もういちど きく</button>
    </div>

    <div class="slots" id="slots" aria-label="こたえの ます"></div>

    <p class="message" id="message" aria-live="polite"></p>

    <!-- card mode -->
    <div class="answer-area" id="cards-area">
      <div class="choices" id="choices" aria-label="ひらがな ふだ"></div>
      <button class="ghost-btn redo" id="redo-btn">↺ やりなおし</button>
    </div>

    <!-- handwriting (trace) mode -->
    <div class="answer-area" id="trace-area" hidden>
      <div class="pad-wrap">
        <canvas id="pad-guide" width="300" height="300" aria-hidden="true"></canvas>
        <canvas id="pad" width="300" height="300" role="img" aria-label="てがき"></canvas>
        <span class="ghost-dot" id="ghost-dot" aria-hidden="true"></span>
        <span class="pad-done" id="pad-done" aria-hidden="true">✓</span>
      </div>
      <div class="trace-actions">
        <button class="ghost-btn redo" id="demo-btn">▶ おてほん</button>
        <button class="ghost-btn redo" id="clear-btn">↺ けす</button>
        <button class="btn btn--next trace-done-btn" id="trace-done-btn" aria-disabled="true" disabled>なぞってね</button>
      </div>
    </div>

    <div class="answer-area clap-area" id="clap-area" hidden>
      <div class="mora-dots" id="mora-dots" aria-hidden="true"></div>
      <button class="clap-btn" id="clap-btn" aria-label="てを たたく">👏</button>
      <button class="ghost-btn redo clap-reset" id="clap-reset">↺ もういちど</button>
    </div>

    <div class="answer-area mirror-area" id="mirror-area" hidden>
      <div class="mirror-choices" id="mirror-choices" aria-label="ただしい むき"></div>
    </div>

    <div class="answer-area ear-area" id="ear-area" hidden>
      <button class="ear-btn" id="ear-btn" aria-label="ことばを きく">👂</button>
      <div class="ear-choices" id="ear-choices" aria-label="きこえた え"></div>
      <button class="ghost-btn redo" id="ear-repeat-btn">🔊 もういちど</button>
    </div>
  </section>

  <!-- ============ SUCCESS ============ -->
  <section class="screen success" id="screen-success" aria-label="せいかい">
    <div class="success__emoji" id="success-emoji" aria-hidden="true">🐱</div>
    <div class="success__word" id="success-word">
      <span id="success-word-text">ねこ</span>
      <span class="stamp" id="stamp" aria-hidden="true"></span>
    </div>
    <p class="success__msg" id="success-msg">できたね！</p>
    <button class="btn btn--next" id="next-btn">つぎへ →</button>
  </section>

  <!-- ============ END OF SET ============ -->
  <section class="screen end" id="screen-end" aria-label="おしまい">
    <div class="end__emoji" aria-hidden="true">🎉</div>
    <h1 class="end__title">おしまい！</h1>
    <p class="end__count" id="end-count">5もん あそんだよ</p>
    <div class="end__hanas" id="end-hanas" aria-hidden="true"></div>
    <div class="end__actions">
      <button class="btn btn--next" id="again-btn">もういちど</button>
      <button class="btn btn--next btn--soft" id="gohome-btn">おうちへ</button>
    </div>
  </section>

  <section class="screen end" id="screen-rest" aria-label="きょうは おしまい">
    <div class="end__emoji" aria-hidden="true">🌙</div>
    <h1 class="end__title">きょうは おしまい</h1>
    <p class="end__count">また あした あそぼうね</p>
    <div class="end__actions">
      <button class="btn btn--next btn--soft" id="rest-home-btn">おうちへ</button>
    </div>
  </section>

</div>

<!-- ============ PARENT SHEET ============ -->
<div class="sheet-veil" id="parent-veil" aria-hidden="true">
  <div class="sheet" id="parent-sheet" role="dialog" aria-modal="true" aria-labelledby="parent-title">
    <div class="sheet__header">
      <h2 id="parent-title" tabindex="-1">お家の方へ</h2>
      <button class="sheet__x" id="sheet-close-top" type="button" aria-label="閉じる">×</button>
    </div>
    <p class="note">4歳向けのことば遊びです。1セットは5問。短く遊べます。</p>
    <div class="sheet__row">
      <span class="k">音</span>
      <button class="toggle is-on" id="sound-toggle" role="switch" aria-checked="true" aria-label="音 オン・オフ"></button>
    </div>
    <div class="sheet__row">
      <span class="k">遊び方</span>
      <div class="mode-seg mode-seg--wrap" id="mode-seg" role="group" aria-label="遊び方">
        <button class="mode-opt" type="button" data-mode="cards" data-card-level="0">🃏 札</button>
        <button class="mode-opt" type="button" data-mode="cards" data-card-level="3">🔤 3文字札</button>
        <button class="mode-opt" type="button" data-mode="trace">✏️ 手書き</button>
        <button class="mode-opt" type="button" data-mode="clap">👏 拍手</button>
        <button class="mode-opt" type="button" data-mode="mirror">↔ 向き</button>
        <button class="mode-opt" type="button" data-mode="teach">💬 教える</button>
        <button class="mode-opt" type="button" data-mode="ear">👂 聞く</button>
      </div>
    </div>
    <div class="sheet__row sheet__row--stack">
      <span class="k">トップに表示</span>
      <div class="mode-seg mode-seg--wrap" id="home-toggle-seg" role="group" aria-label="トップに表示する遊び方">
        <button class="mode-opt" type="button" data-home-toggle="cards">🃏 札</button>
        <button class="mode-opt" type="button" data-home-toggle="cards3">🔤 3文字札</button>
        <button class="mode-opt" type="button" data-home-toggle="trace">✏️ 手書き</button>
        <button class="mode-opt" type="button" data-home-toggle="clap">👏 拍手</button>
        <button class="mode-opt" type="button" data-home-toggle="mirror">↔ 向き</button>
        <button class="mode-opt" type="button" data-home-toggle="teach">💬 教える</button>
        <button class="mode-opt" type="button" data-home-toggle="ear">👂 聞く</button>
      </div>
    </div>
    <div class="sheet__row sheet__row--stack">
      <span class="k">サポート</span>
      <div class="mode-seg mode-seg--wrap" id="pref-seg" role="group" aria-label="サポート">
        <button class="mode-opt" type="button" data-pref="calm">静か</button>
        <button class="mode-opt" type="button" data-pref="bigTargets">大きい</button>
        <button class="mode-opt" type="button" data-pref="lefty">左手</button>
      </div>
    </div>
    <div class="sheet__row sheet__row--stack">
      <span class="k">遊ぶ時間</span>
      <div class="mode-seg" id="limit-seg" role="group" aria-label="遊ぶ時間の制限">
        <button class="mode-opt" type="button" data-limit="0">なし</button>
        <button class="mode-opt" type="button" data-limit="5">5分</button>
        <button class="mode-opt" type="button" data-limit="10">10分</button>
        <button class="mode-opt" type="button" data-limit="15">15分</button>
      </div>
    </div>
    <div class="sheet__row">
      <span class="k">今日遊んだ時間</span>
      <span class="timer-reset">
        <span class="v" id="stat-playtime">0分</span>
        <button class="ghost-btn" id="timer-reset-btn" type="button">リセット</button>
      </span>
    </div>
    <div class="sheet__row">
      <span class="k">遊んだ問題</span>
      <span class="v" id="stat-played">0</span>
    </div>
    <div class="sheet__row">
      <span class="k">正解</span>
      <span class="v" id="stat-correct">0</span>
    </div>
    <div class="sheet__row sheet__row--stack">
      <span class="k">ことばを追加</span>
      <div class="custom-panel">
        <input id="custom-word" inputmode="text" maxlength="4" placeholder="かな 2〜4文字" aria-label="かな 2から4文字" />
        <div class="custom-emojis" id="custom-emojis" aria-label="絵を選ぶ"></div>
        <button class="ghost-btn" id="custom-add-btn" type="button">＋ 追加</button>
        <div class="custom-feedback" id="custom-feedback" role="status" aria-live="polite"></div>
        <div class="custom-list" id="custom-list"></div>
      </div>
    </div>
    <div class="sheet__row sheet__row--stack">
      <span class="k">今週</span>
      <div class="trail-chart" id="trail-chart" aria-hidden="true"></div>
      <div class="focus-text" id="focus-text">まだ記録はありません</div>
    </div>
    <div class="sheet__row">
      <span class="k">人を増やす</span>
      <button class="ghost-btn" id="profile-add-btn" type="button">＋</button>
    </div>
    <button class="btn sheet__close" id="sheet-close">閉じる</button>
  </div>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
